<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Take Quiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --dark: #111827;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.15) 22%, transparent 40%),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0.10) 20%, transparent 38%),
                linear-gradient(135deg, #dff6ff 0%, #bfe9ff 35%, #9ad9ff 70%, #c8f1ff 100%);
            background-attachment: fixed;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        /* Header */

        .header-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Glass Card */

        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 35px rgba(31, 38, 135, 0.16);
            border-radius: 2rem;
        }

        /* Inputs */

        .glass-input {
            background: rgba(255, 255, 255, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: #111827;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
        }

        /* Question Block */

        .question-card {
            background: rgba(255, 255, 255, 0.35);
            border-radius: 1rem;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Button */

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 18px;
            background: #4F46E5;
            border: none;
            color: white;
        }

        .btn-submit:hover {
            background: #4338ca;
        }
    </style>

</head>

<body>

    <!-- Header -->

    <header class="header-glass">
        <nav class="container py-3 d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center gap-2">

                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#4F46E5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>

                <span class="fs-3 fw-bold">
                    BRAIN<span style="color:#4F46E5">STORM</span>
                </span>

            </div>

        </nav>
    </header>


    <!-- Quiz Content -->

    <div class="container mt-5">

        <div class="glass-card p-5">

            <h2 class="text-center fw-bold mb-4" th:text="${quiz.title}"></h2>

            <form th:action="@{/attempts/submit/{quizId}(quizId=${quiz.id})}" th:object="${submission}" method="post">

                <div class="mb-4">

                    <label class="form-label fw-bold">Username</label>

                    <input type="text" class="form-control glass-input" th:field="*{username}" />

                </div>

                <hr>

                <div th:each="q,stat : ${quiz.questions}" class="question-card">

                    <h5 class="fw-bold" th:text="${stat.index + 1 + '. ' + q.questionTitle}">
                    </h5>

                    <input type="hidden" th:field="*{answers[__${stat.index}__].questionId}" th:value="${q.id}" />

                    <div class="form-check mt-3">

                        <input class="form-check-input" type="radio"
                            th:field="*{answers[__${stat.index}__].selectedAnswer}" value="option1">

                        <label class="form-check-label" th:text="${q.option1}">
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="radio"
                            th:field="*{answers[__${stat.index}__].selectedAnswer}" value="option2">

                        <label class="form-check-label" th:text="${q.option2}">
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="radio"
                            th:field="*{answers[__${stat.index}__].selectedAnswer}" value="option3">

                        <label class="form-check-label" th:text="${q.option3}">
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="radio"
                            th:field="*{answers[__${stat.index}__].selectedAnswer}" value="option4">

                        <label class="form-check-label" th:text="${q.option4}">
                        </label>

                    </div>

                </div>

                <button type="submit" class="btn-submit">
                    Submit Quiz
                </button>

            </form>

        </div>

    </div>

</body>

</html>
