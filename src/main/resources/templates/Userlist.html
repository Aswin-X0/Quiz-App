<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>User List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --danger: #e74c3c;
            --dark: #111827;
        }

        /* Background */
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.15) 22%, transparent 40%),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0.10) 20%, transparent 38%),
                linear-gradient(135deg, #dff6ff 0%, #bfe9ff 35%, #9ad9ff 70%, #c8f1ff 100%);
            background-attachment: fixed;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        /* Glass Header */
        .header-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 35px rgba(31, 38, 135, 0.16);
            border-radius: 2rem;
        }

        /* Table Styling */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: #4F46E5;
            color: white;
        }

        /* Buttons */

        .btn-edit {
            background: #4F46E5;
            color: white;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-edit:hover {
            background: #4338ca;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-delete:hover {
            background: #c0392b;
            color: white;
        }

        .btn-home {
            background: #4F46E5;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
        }

        .btn-home:hover {
            background: #4338ca;
            color: white;
        }
    </style>

</head>

<body>

    <!-- Header -->
    <header class="header-glass">
        <nav class="container py-3 d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center gap-2">

                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#4F46E5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>

                <span class="fs-3 fw-bold">
                    BRAIN<span style="color:#4F46E5">STORM</span>
                </span>

            </div>

        </nav>
    </header>


    <!-- Page Content -->

    <div class="container mt-5">

        <div class="glass-card p-5">

            <h2 class="text-center mb-4 fw-bold">All Users</h2>

            <div class="table-responsive">

                <table class="table table-hover align-middle text-center">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.role}"></td>

                            <td>

                                <a th:href="@{'/Brainstorm/useredit/' + ${user.username}}" class="btn-edit me-2">
                                    Edit
                                </a>

                                <a th:href="@{'/Brainstorm/deleteuser/' + ${user.id}}" class="btn-delete"
                                    onclick="return confirm('Are you sure you want to delete this user?');">
                                    Delete
                                </a>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div class="text-center mt-4">

                <a href="/Brainstorm/home" class="btn-home">
                    Back to Home
                </a>

            </div>

        </div>

    </div>

</body>

</html>
