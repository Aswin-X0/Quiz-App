<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attempt Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --dark: #111827;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.15) 22%, transparent 40%),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0.10) 20%, transparent 38%),
                linear-gradient(135deg, #dff6ff 0%, #bfe9ff 35%, #9ad9ff 70%, #c8f1ff 100%);
            background-attachment: fixed;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        /* Header */

        .header-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Glass Card */

        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 35px rgba(31, 38, 135, 0.16);
            border-radius: 2rem;
        }

        /* Table */

        .table thead {
            background: #4F46E5;
            color: white;
        }

        /* Buttons */

        .btn-back {
            background: #4F46E5;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
        }

        .btn-back:hover {
            background: #4338ca;
            color: white;
        }

        .correct {
            color: #10B981;
            font-weight: bold;
        }

        .wrong {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- Header -->

    <header class="header-glass">
        <nav class="container py-3 d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center gap-2">

                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#4F46E5">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>

                <span class="fs-3 fw-bold">
                    BRAIN<span style="color:#4F46E5">STORM</span>
                </span>

            </div>

        </nav>
    </header>


    <!-- Content -->

    <div class="container mt-5">

        <div class="glass-card p-5">

            <h2 class="fw-bold mb-4 text-center">Attempt Details</h2>

            <div class="row mb-4 text-center">

                <div class="col-md-3">
                    <b>Username</b><br>
                    <span th:text="${attempt.username}"></span>
                </div>

                <div class="col-md-3">
                    <b>Quiz</b><br>
                    <span th:text="${attempt.quiz.title}"></span>
                </div>

                <div class="col-md-3">
                    <b>Score</b><br>
                    <span th:text="${attempt.score}"></span>
                </div>

                <div class="col-md-3">
                    <b>Total Questions</b><br>
                    <span th:text="${attempt.totalQuestions}"></span>
                </div>

            </div>

            <hr>

            <h4 class="mb-3">Submitted Answers</h4>

            <div class="table-responsive">

                <table class="table table-hover text-center align-middle">

                    <thead>

                        <tr>
                            <th>Question</th>
                            <th>Selected Option</th>
                            <th>Correct?</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="s : ${attempt.submissions}">

                            <td th:text="${s.question.questionTitle}"></td>

                            <td th:text="${s.selectedOption}"></td>

                            <td>
                                <span th:text="${s.isCorrect}" th:classappend="${s.isCorrect} ? 'correct' : 'wrong'">
                                </span>
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div class="text-center mt-4">

                <a href="/attempts/all" class="btn-back">
                    Back to Attempts
                </a>

            </div>

        </div>

    </div>

</body>

</html>
