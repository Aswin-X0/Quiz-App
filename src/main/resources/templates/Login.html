<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainStorm Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --accent: #10B981;
            --dark: #111827;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.15) 22%, transparent 40%),
                radial-gradient(circle at top right, rgba(255, 255, 255, 0.65) 0%, rgba(255, 255, 255, 0.10) 20%, transparent 38%),
                linear-gradient(135deg, #dff6ff 0%, #bfe9ff 35%, #9ad9ff 70%, #c8f1ff 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 9999px;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            width: 280px;
            height: 280px;
            top: 80px;
            left: 60px;
            background: rgba(255, 255, 255, 0.45);
        }

        body::after {
            width: 320px;
            height: 320px;
            bottom: 60px;
            right: 80px;
            background: rgba(125, 211, 252, 0.35);
        }

        .header-glass {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 35px rgba(31, 38, 135, 0.16);
            border-radius: 2rem;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: #111827;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
        }

        .glass-input:focus {
            border-color: rgba(79, 70, 229, 0.8);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.14);
            background: rgba(255, 255, 255, 0.4);
        }

        .btn-primary-custom {
            width: 100%;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 18px;
            background: var(--primary);
            border: none;
            color: white;
        }

        .btn-primary-custom:hover {
            background: #4338ca;
        }

        .glossy-pill {
            padding: 6px 16px;
            border-radius: 999px;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.55) 0%,
                    rgba(255, 255, 255, 0.18) 100%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }
    </style>

</head>

<body>

    <header class="header-glass">
        <nav class="container py-3 d-flex justify-content-between align-items-center">

            <div class="d-flex align-items-center gap-2">

                <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    style="color:var(--primary)">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>

                <span class="fs-3 fw-bold">
                    BRAIN<span style="color:var(--primary)">STORM</span>
                </span>

            </div>

        </nav>
    </header>


    <main class="d-flex justify-content-center align-items-center px-3"
        style="min-height:calc(100vh - 80px); position:relative; z-index:10;">

        <div style="max-width:450px;width:100%;">

            <div class="glass-card p-5">

                <span class="glossy-pill">Login</span>

                <h2 class="mt-3 fw-bold" style="font-size:32px;">
                    Welcome Back
                </h2>

                <p class="text-secondary mb-4">
                    Login to continue your BrainStorm journey.
                </p>


                <form th:action="@{/Brainstorm/login}" method="post">

                    <div class="mb-4">
                        <input type="text" name="username" placeholder="Username" class="form-control glass-input">
                    </div>

                    <div class="mb-4">
                        <input type="password" name="password" placeholder="Password" class="form-control glass-input">
                    </div>

                    <button type="submit" class="btn-primary-custom">
                        Login
                    </button>

                    <p class="text-danger mt-3" th:if="${error}" th:text="${error}">
                    </p>

                </form>

            </div>
        </div>

    </main>

</body>

</html>
